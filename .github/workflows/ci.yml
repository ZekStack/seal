name: CI

on:
  push:
    branches: [ main, master, 'feature/**' ]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  ARDUINO_BOARD_MANAGER_ADDITIONAL_URLS: https://espressif.github.io/arduino-esp32/package_esp32_index.json
  ARDUINO_CLI_VERSION: 1.5.0
  ARDUINO_NETWORK_CONNECTION_TIMEOUT: 240s
  ESP32_CORE_VERSION: 3.3.9
  PIOARDUINO_PLATFORM_URL: https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
  PIOARDUINO_PLATFORM_VERSION: 55.03.39
  PIOARDUINO_VERSION: 6.1.19

jobs:
  source-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit production sources
        run: |
          if grep -RInE '(^|[^[:alnum:]_])throw([^[:alnum:]_]|$)|std::abort[[:space:]]*\(' src; then
            echo "Embedded safety audit failed"
            exit 1
          fi
          if grep -RIn 'mbedtls/' src | grep -v 'src/internal/SealCryptoMbedTls.cpp'; then
            echo "mbedTLS must stay behind the SealCrypto backend boundary"
            exit 1
          fi
          if grep -RInE '#include[[:space:]]+[<"](Fresh|Pulse|Signal|Tempo|Trace|Worker|Vault|Link|Courier|Flow|Lingo|Phase)\\.h[>"]' src; then
            echo "Seal must not depend on other ZekStack libraries"
            exit 1
          fi

  host-internal-tests:
    runs-on: ubuntu-latest
    needs: source-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and run host internal tests
        run: |
          g++ -std=c++20 -Wall -Wextra -pedantic \
            -DSEAL_HOST_CRYPTO_OPENSSL \
            -Itests/host/stubs \
            -Isrc \
            src/internal/SealBase64Url.cpp \
            src/internal/SealCrypto.cpp \
            tests/host/SealCryptoHostOpenSsl.cpp \
            tests/host/test_seal_internals.cpp \
            -lcrypto \
            -o /tmp/seal-host-tests
          /tmp/seal-host-tests

      - name: Install host test dependencies
        run: |
          set -e
          curl -L -o /tmp/ArduinoJson-7.4.3.tar.gz \
            https://github.com/bblanchon/ArduinoJson/archive/refs/tags/v7.4.3.tar.gz
          mkdir -p /tmp/ArduinoJson-7.4.3
          tar -xzf /tmp/ArduinoJson-7.4.3.tar.gz \
            -C /tmp/ArduinoJson-7.4.3 \
            --strip-components=1
          npm install jsonwebtoken@9.0.3

      - name: Build and run host JWT tests
        run: |
          g++ -std=c++20 -Wall -Wextra -pedantic \
            -DSEAL_HOST_CRYPTO_OPENSSL \
            -I/tmp/ArduinoJson-7.4.3/src \
            -Itests/host/stubs \
            -Isrc \
            src/Seal.cpp \
            src/internal/SealBase64Url.cpp \
            src/internal/SealCrypto.cpp \
            tests/host/SealCryptoHostOpenSsl.cpp \
            tests/host/test_seal_jwt.cpp \
            -lcrypto \
            -o /tmp/seal-jwt-tests
          /tmp/seal-jwt-tests

      - name: Build and run ESP32 lifecycle host tests
        run: |
          g++ -std=c++20 -Wall -Wextra -pedantic \
            -DESP32 \
            -DSEAL_HOST_CRYPTO_OPENSSL \
            -I/tmp/ArduinoJson-7.4.3/src \
            -Itests/host/esp32_stubs \
            -Isrc \
            src/Seal.cpp \
            src/internal/SealBase64Url.cpp \
            src/internal/SealCrypto.cpp \
            tests/host/SealCryptoHostOpenSsl.cpp \
            tests/host/SealHostFreeRtos.cpp \
            tests/host/test_seal_esp32_lifecycle.cpp \
            -lcrypto \
            -pthread \
            -o /tmp/seal-esp32-lifecycle-tests
          /tmp/seal-esp32-lifecycle-tests

      - name: Run Node jsonwebtoken compatibility tests
        run: |
          g++ -std=c++20 -Wall -Wextra -pedantic \
            -DSEAL_HOST_CRYPTO_OPENSSL \
            -I/tmp/ArduinoJson-7.4.3/src \
            -Itests/host/stubs \
            -Isrc \
            src/Seal.cpp \
            src/internal/SealBase64Url.cpp \
            src/internal/SealCrypto.cpp \
            tests/host/SealCryptoHostOpenSsl.cpp \
            tests/host/seal_compat_cli.cpp \
            -lcrypto \
            -o /tmp/seal-compat-cli
          node tests/host/test_node_compat.js /tmp/seal-compat-cli

  build-examples:
    runs-on: ubuntu-latest
    needs: [source-audit, host-internal-tests]
    strategy:
      fail-fast: false
      matrix:
        board: [esp32dev, esp32-s3-devkitc-1, esp32-c3-devkitm-1, esp32-p4-evboard]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache PIOArduino
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pioarduino-${{ env.PIOARDUINO_VERSION }}-${{ env.PIOARDUINO_PLATFORM_VERSION }}-${{ hashFiles('**/library.json') }}
          restore-keys: |
            ${{ runner.os }}-pioarduino-${{ env.PIOARDUINO_VERSION }}-${{ env.PIOARDUINO_PLATFORM_VERSION }}-

      - name: Install PIOArduino Core
        run: python -m pip install --upgrade "pioarduino==${PIOARDUINO_VERSION}"

      - name: Install PIOArduino ESP32 Platform
        run: pio pkg install -g -p "${PIOARDUINO_PLATFORM_URL}"

      - name: Build library examples
        run: |
          set -e
          for d in examples/*; do
            if [ -d "$d" ]; then
              echo "Building $d on ${{ matrix.board }}"
              pio ci "$d" \
                --board ${{ matrix.board }} \
                --lib="." \
                --project-option "platform=${PIOARDUINO_PLATFORM_URL}" \
                --project-option "build_unflags=-std=gnu++11" \
                --project-option "build_flags=-std=gnu++20"
            fi
          done

  arduino-cli:
    runs-on: ubuntu-latest
    needs: [source-audit, host-internal-tests]
    strategy:
      fail-fast: false
      matrix:
        board:
          - fqbn: esp32:esp32:esp32
            name: esp32dev
          - fqbn: esp32:esp32:esp32s3
            name: esp32-s3-devkitc-1
          - fqbn: esp32:esp32:esp32c3
            name: esp32-c3-devkitm-1
          - fqbn: esp32:esp32:esp32p4
            name: esp32-p4-evboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: ${{ env.ARDUINO_CLI_VERSION }}

      - name: Cache Arduino CLI packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/.cache/arduino
          key: ${{ runner.os }}-arduino-cli-${{ env.ARDUINO_CLI_VERSION }}-esp32-${{ env.ESP32_CORE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-arduino-cli-${{ env.ARDUINO_CLI_VERSION }}-esp32-

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install "esp32:esp32@${ESP32_CORE_VERSION}"

      - name: Install ArduinoJson
        run: arduino-cli lib install "ArduinoJson@7.4.3"

      - name: Add local library to sketchbook
        run: |
          set -e
          SKETCHBOOK_DIR="${HOME}/Arduino"
          mkdir -p "$SKETCHBOOK_DIR/libraries/Seal"
          rsync -a --delete --exclude ".git" ./ "$SKETCHBOOK_DIR/libraries/Seal/"

      - name: Build examples (${{ matrix.board.name }})
        env:
          FQBN: ${{ matrix.board.fqbn }}
        run: |
          set -e
          for d in examples/*; do
            if [ -d "$d" ]; then
              echo "Compiling $d"
              arduino-cli compile \
                --fqbn "$FQBN" \
                --build-property "compiler.cpp.extra_flags=-std=gnu++20" \
                "$d"
            fi
          done
